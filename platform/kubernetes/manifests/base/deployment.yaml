apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-portal-app
  labels:
    app: edge-portal-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge-portal-app
  template:
    metadata:
      labels:
        app: edge-portal-app
    spec:
      containers:
        - name: edge-portal-app
          image: ghcr.io/virtex/edge-portal-app:latest
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: edge-portal-app
spec:
  selector:
    app: edge-portal-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
