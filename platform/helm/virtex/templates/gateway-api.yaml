apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: virtex-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: portal-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: virtex-gateway
  hostnames:
    - "portal.virtex.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bff-portal
          port: 80
---
