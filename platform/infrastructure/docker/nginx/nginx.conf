events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    gzip on;
    gzip_types text/plain application/xml text/css application/javascript application/json;

    # Upstreams
    upstream bff_portal { server bff-portal:3000; }
    upstream bff_pos { server bff-pos:3000; }
    upstream bff_wms { server bff-wms:3000; }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;
        # SSL Certificates should be volume-mounted at runtime from a secure store (e.g. Vault, K8s Secret)
        # For local development, generate them and place them in the certs directory (ignored by git)
        ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

        # BFF ROUTES
        location /api/portal/ {
            proxy_pass http://bff_portal/api/portal/;
            proxy_set_header Host $host;
        }

        location /api/pos/ {
            proxy_pass http://bff_pos/api/pos/;
            proxy_set_header Host $host;
        }

        location /api/wms/ {
            proxy_pass http://bff_wms/api/wms/;
            proxy_set_header Host $host;
        }
    }
}
