version: '3.8'

services:
  zookeeper:
    # Pinning to semantic version + SHA256 digest for immutability
    image: confluentinc/cp-zookeeper:7.5.0@sha256:56b060640d2f09457691230114f68686d63ca8f7f85890f5f84d009772e04e90
    container_name: virteex-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    # Pinning to semantic version + SHA256 digest for immutability
    image: confluentinc/cp-kafka:7.5.0@sha256:54247f12e8601815f91753443327f311c1682701e695d7f3531b402e1c750b3e
    container_name: virteex-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    # Pinning to semantic version + SHA256 digest for immutability
    image: postgres:15.6-alpine@sha256:f1245842f1f50a80e60805cf327598f8047970f90c1097e108250b73c4d9e0bc
    container_name: virteex-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  redis:
    # Pinning to semantic version + SHA256 digest for immutability
    image: redis:7.2.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: virteex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  keycloak:
    # Pinning to semantic version + SHA256 digest for immutability
    image: quay.io/keycloak/keycloak:23.0.0@sha256:b7bccfd8bb24e342fa0465e4dbcf9334236fc4df5483bc30edbb585071a2f0b0
    container_name: virteex-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/virteex_keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  jaeger:
    # Pinning to semantic version + SHA256 digest for immutability
    image: jaegertracing/all-in-one:1.50@sha256:9be1030e64f77f3a970967a942b033f74220ec26850c950936746960010901e5
    container_name: virteex-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: true

  traefik:
    image: traefik:v2.10
    container_name: virteex-traefik
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/etc/traefik/certs:ro

volumes:
  postgres_data:
  redis_data:
