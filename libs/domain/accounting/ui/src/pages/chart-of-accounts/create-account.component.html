<div class="p-6">
  <div class="flex items-center mb-8">
    <a routerLink="../" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium transition-colors group">
      <lucide-icon name="arrow-left" class="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform"></lucide-icon>
      {{ 'ACCOUNTING.COMMON.BACK' | translate }}
    </a>
    <h1 class="text-2xl font-bold ml-6 text-gray-800">{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.CREATE_TITLE' | translate }}</h1>
  </div>

  <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 max-w-2xl mx-auto">
    <form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.CODE' | translate }}</label>
        <input type="text" formControlName="code"
               class="mt-1 block w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
               [class.border-red-500]="f['code'].touched && f['code'].invalid"
               [class.border-gray-300]="!(f['code'].touched && f['code'].invalid)"
               placeholder="e.g. 1100.01" />
        <div *ngIf="f['code'].touched && f['code'].invalid" class="text-red-500 text-xs mt-1 font-medium flex items-center">
          <lucide-icon name="alert-circle" class="w-3 h-3 mr-1"></lucide-icon>
          {{ 'ACCOUNTING.VALIDATION.REQUIRED' | translate }}
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.NAME' | translate }}</label>
        <input type="text" formControlName="name"
               class="mt-1 block w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
               [class.border-red-500]="f['name'].touched && f['name'].invalid"
               [class.border-gray-300]="!(f['name'].touched && f['name'].invalid)"
               placeholder="e.g. Petty Cash" />
        <div *ngIf="f['name'].touched && f['name'].invalid" class="text-red-500 text-xs mt-1 font-medium flex items-center">
          <lucide-icon name="alert-circle" class="w-3 h-3 mr-1"></lucide-icon>
          {{ 'ACCOUNTING.VALIDATION.REQUIRED' | translate }}
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.TYPE' | translate }}</label>
        <select formControlName="type"
                class="mt-1 block w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white transition-all"
                [class.border-red-500]="f['type'].touched && f['type'].invalid"
                [class.border-gray-300]="!(f['type'].touched && f['type'].invalid)">
          <option [value]="null" disabled selected>{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.SELECT_TYPE' | translate }}</option>
          <option *ngFor="let type of accountTypes" [value]="type">{{ type }}</option>
        </select>
        <div *ngIf="f['type'].touched && f['type'].invalid" class="text-red-500 text-xs mt-1 font-medium flex items-center">
          <lucide-icon name="alert-circle" class="w-3 h-3 mr-1"></lucide-icon>
          {{ 'ACCOUNTING.VALIDATION.REQUIRED' | translate }}
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">{{ 'ACCOUNTING.CHART_OF_ACCOUNTS.PARENT_ACCOUNT' | translate }} ({{ 'ACCOUNTING.COMMON.OPTIONAL' | translate }})</label>
        <select formControlName="parentId"
                class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white transition-all">
          <option [value]="null">{{ 'ACCOUNTING.COMMON.NONE' | translate }}</option>
          <option *ngFor="let acc of accounting.accounts()" [value]="acc.id">{{ acc.code }} - {{ acc.name }}</option>
        </select>
      </div>

      <div class="flex justify-end pt-4 space-x-4">
        <button type="button" routerLink="../" class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 font-semibold hover:bg-gray-50 transition-colors">
          {{ 'ACCOUNTING.COMMON.CANCEL' | translate }}
        </button>
        <button type="submit"
                [disabled]="accountForm.invalid || loading"
                class="flex items-center px-8 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
          <lucide-icon *ngIf="loading" name="loader-2" class="w-4 h-4 mr-2 animate-spin"></lucide-icon>
          {{ (loading ? 'ACCOUNTING.COMMON.SAVING' : 'ACCOUNTING.CHART_OF_ACCOUNTS.CREATE_BUTTON') | translate }}
        </button>
      </div>

      <div *ngIf="error" class="text-red-600 p-4 bg-red-50 border border-red-100 rounded-lg text-sm text-center flex items-center justify-center font-medium">
        <lucide-icon name="x-circle" class="w-4 h-4 mr-2"></lucide-icon>
        {{ error }}
      </div>
    </form>
  </div>
</div>
