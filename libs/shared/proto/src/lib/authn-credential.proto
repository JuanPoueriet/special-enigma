
syntax = "proto3";

package authn;

service AuthnCredentialService {
  rpc Login (LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string recaptchaToken = 3;
}

message LoginResponse {
  string accessToken = 1;
  string refreshToken = 2;
  int32 expiresIn = 3;
  bool mfaRequired = 4;
  string tempToken = 5;
}
