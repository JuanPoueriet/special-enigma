<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">New Project</h1>
    <a routerLink="../list" class="text-blue-600 hover:text-blue-800">
      Cancel
    </a>
  </div>

  <div class="bg-white shadow-md rounded-lg p-6 max-w-2xl mx-auto">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="mb-4">
        <label for="name" class="block text-sm font-medium text-gray-700">Project Name</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
          placeholder="e.g. Website Redesign"
        >
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="mt-2 text-sm text-red-600">Name is required.</p>
        }
      </div>

      <div class="mb-4">
        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <textarea
          id="description"
          formControlName="description"
          rows="3"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
        ></textarea>
      </div>

      <div class="mb-4">
        <label for="startDate" class="block text-sm font-medium text-gray-700">Start Date</label>
        <input
          type="date"
          id="startDate"
          formControlName="startDate"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
        >
        @if (form.get('startDate')?.invalid && form.get('startDate')?.touched) {
          <p class="mt-2 text-sm text-red-600">Start Date is required.</p>
        }
      </div>

      <div class="flex justify-end pt-4">
        <button
          type="submit"
          [disabled]="form.invalid || isSubmitting"
          class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isSubmitting ? 'Creating...' : 'Create Project' }}
        </button>
      </div>
    </form>
  </div>
</div>
