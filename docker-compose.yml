version: '3.8'

services:
  # UNIFIED GATEWAY (NGINX)
  nginx:
    # Pinning to semantic version + SHA256 digest for immutability
    image: nginx:1.27-alpine@sha256:f46cb72c7df02710e693e863a983ac42f6a9579058a59a35f1ae36c9958e4ce0
    container_name: virtex-unified-gateway
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./platform/infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./platform/infrastructure/docker/nginx/certs:/etc/nginx/certs
    depends_on:
      - api-gateway
      - identity-service
      - inventory-service
      - billing-service
      - crm-service
      - fiscal-service
      - scheduler-service
      - gateway
      - catalog-service

  # API GATEWAY (Monolith)
  api-gateway:
    image: node:22.12.0-alpine
    container_name: virtex-api-gateway
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PORT=3000
      - virtex_HMAC_SECRET=${virtex_HMAC_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - POSTGRES_URL=${POSTGRES_URL:-postgres://virtex:${POSTGRES_PASSWORD}@postgres:5432/virtex_erp}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=virtex
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=virtex_erp
      - DB_DRIVER=postgres
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
    command: npx nx serve virtex-api-gateway
    depends_on:
      - postgres
      - redis
      - kafka

