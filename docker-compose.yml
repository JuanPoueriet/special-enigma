  # GATEWAY (Apollo)
  gateway:
    image: node:22.12.0-alpine
    container_name: virtex-gateway
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PORT=3000
      - CATALOG_SERVICE_URL=http://catalog-service:3000/graphql
      - NODE_ENV=${NODE_ENV:-development}
    command: npx nx serve virtex-gateway
    depends_on:
      - catalog-service

  postgres:
    # Pinning to semantic version + SHA256 digest for immutability
    image: timescale/timescaledb:2.13.0-pg15@sha256:a4994627d9067ec44b1da8483b3de795389b3a783a9c8db915c7b2ca5b172f52
    container_name: virtex-postgres
    restart: always
    environment:
      POSTGRES_USER: virtex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: virtex_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/infrastructure/docker/init-scripts/01-create-databases.sh:/docker-entrypoint-initdb.d/01-create-databases.sh

  redis:
    # Pinning to semantic version + SHA256 digest for immutability
    image: redis:7.2.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: virtex-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    # Pinning to semantic version + SHA256 digest for immutability
    image: bitnami/zookeeper:3.9.1@sha256:f56ea4f9013021b45597fb2133efa1a64218feeb8866cf2a998be1c58ac021b4
    container_name: virtex-zookeeper
    ports:
      - "2181:2181"
    environment:
      # Hardened: Disallow anonymous login
      - ALLOW_ANONYMOUS_LOGIN=no

  kafka:
    # Pinning to semantic version + SHA256 digest for immutability
    image: bitnami/kafka:3.6.1@sha256:b7bccfd8bb24e342fa0465e4dbcf9334236fc4df5483bc30edbb585071a2f0b0
    container_name: virtex-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      # Hardened: Use SASL_PLAINTEXT for internal and external listeners
      - KAFKA_CFG_LISTENERS=SASL_PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=SASL_PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=SASL_PLAINTEXT:SASL_PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=no
    depends_on:
      - zookeeper

  # Observability Stack
  jaeger:
    # Pinning to semantic version + SHA256 digest for immutability
    image: jaegertracing/all-in-one:1.53@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac
    container_name: virtex-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    # Pinning to semantic version + SHA256 digest for immutability
    image: prom/prometheus:v2.49.1@sha256:d1010a52641b282b6c8584431b7e01589b4d556396904396446f72db54549aa9
    container_name: virtex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./platform/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    # Pinning to semantic version + SHA256 digest for immutability
    image: grafana/grafana:10.3.3@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    container_name: virtex-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
# This file defines the full local development environment with extracted microservices.
