      - IDENTITY_DB_HOST=postgres
      - IDENTITY_DB_PORT=5432
      - IDENTITY_DB_USER=virteex
      - IDENTITY_DB_PASSWORD=${POSTGRES_PASSWORD}
      - IDENTITY_DB_NAME=virteex_identity
      - DB_DRIVER=postgres
      - NODE_ENV=${NODE_ENV:-development}
