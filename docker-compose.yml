version: '3.8'

services:
  # UNIFIED GATEWAY (NGINX)
  nginx:
    image: nginx:alpine
    container_name: virteex-unified-gateway
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/docker/nginx/certs:/etc/nginx/certs
    depends_on:
      - api-gateway
      - identity-service
      - inventory-service
      - billing-service
      - crm-service
      - fiscal-service
      - scheduler-service
      - gateway
      - catalog-service

  # API GATEWAY (Monolith)
  api-gateway:
    image: node:20-alpine
    container_name: api-gateway
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PORT=3000
      - VIRTEEX_HMAC_SECRET=${VIRTEEX_HMAC_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - POSTGRES_URL=${POSTGRES_URL:-postgres://virteex:${POSTGRES_PASSWORD}@postgres:5432/virteex_erp}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=virteex
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=virteex_erp
      - DB_DRIVER=postgres
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
    command: npx nx serve api-gateway
    depends_on:
      - postgres
      - redis
      - kafka

  # IDENTITY SERVICE
  identity-service:
    image: node:20-alpine
    container_name: api-identity
    working_dir: /app
    volumes:
