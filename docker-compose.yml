      - CATALOG_DB_NAME=virteex_catalog
      - DB_DRIVER=postgres
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
    command: npx nx serve api-catalog
    depends_on:
      - postgres
      - kafka

  # GATEWAY (Apollo)
  gateway:
    image: node:20-alpine
    container_name: gateway-legacy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PORT=3000
      - CATALOG_SERVICE_URL=http://catalog-service:3000/graphql
      - NODE_ENV=${NODE_ENV:-development}
    command: npx nx serve gateway-legacy
    depends_on:
      - catalog-service

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: virteex-postgres
    restart: always
    environment:
      POSTGRES_USER: virteex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: virteex_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-scripts/01-create-databases.sh:/docker-entrypoint-initdb.d/01-create-databases.sh

  redis:
    image: redis:7-alpine
    container_name: virteex-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: virteex-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:latest
    container_name: virteex-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

  # Observability Stack
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: virteex-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    container_name: virteex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: virteex-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
# This file defines the full local development environment with extracted microservices.
